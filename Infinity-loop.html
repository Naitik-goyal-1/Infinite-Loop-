<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
        <title>Infinity Loop</title>
        <style>
             *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            :root {
                --bg: #080810;
                --surface: #10101e;
                --border: rgba(255,255,255,0.08);
                --text: #e8e4ff;
                --muted: rgba(232,228,255,0.45);
                --accent: #b57bee;
                --font-display: 'Syne', sans-serif;
                --font-mono: 'Space Mono', monospace;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--font-mono);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 2rem 1.5rem 3rem;
                gap: 0;
                scale: 1;
            }

            header {
                text-align: center;
                margin-bottom: 2rem;
            }
            header h1 {
                font-family: var(--font-display);
                font-weight: 800;
                font-size: clamp(2.6rem, 8vw, 5rem);
                letter-spacing: -0.02em;
                line-height: 1;
                background: linear-gradient(135deg, #b57bee 0%, #5ec9f5 50%, #f55e9e 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            header p {
                font-size: 0.72rem;
                color: var(--muted);
                letter-spacing: 0.18em;
                text-transform: uppercase;
                margin-top: 0.5rem;
            }

            .canvas-wrap {
                position: relative;
                width: 100%;
                max-width: 680px;
                border-radius: 16px;
                overflow: hidden;
                border: 1px solid var(--border);
                box-shadow: 0 0 60px rgba(181,123,238,0.12), 0 0 120px rgba(94,201,245,0.06);
            }

            canvas {
                display: block;
                width: 100%;
                background: #080810;
            }

            .watermark {
                position: absolute;
                bottom: 10px;
                right: 14px;
                font-size: 0.6rem;
                color: rgba(255,255,255,0.12);
                letter-spacing: 0.12em;
                text-transform: uppercase;
                pointer-events: none;
                font-family: var(--font-mono);
            }

            .controls {
                width: 100%;
                max-width: 680px;
                margin-top: 1.25rem;
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }

            .slider-row {
                display: grid;
                grid-template-columns: 72px 1fr 36px;
                align-items: center;
                gap: 12px;
            }
            .slider-row label {
                font-size: 0.68rem;
                color: var(--muted);
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }
            .slider-row span {
                font-size: 0.75rem;
                font-weight: 700;
                color: var(--accent);
                text-align: right;
            }

            input[type=range] {
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
                height: 3px;
                background: var(--border);
                border-radius: 99px;
                outline: none;
                cursor: pointer;
            }
            input[type=range]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 14px; height: 14px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 8px var(--accent);
                cursor: pointer;
                transition: transform 0.15s;
            }
            input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.25); }
            input[type=range]::-moz-range-thumb {
                width: 14px; height: 14px;
                border-radius: 50%;
                background: var(--accent);
                border: none;
            }

            .divider {
                width: 100%;
                height: 1px;
                background: var(--border);
                margin: 0.25rem 0;
            }

            .btn-row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }

            button {
                font-family: var(--font-mono);
                font-size: 0.65rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                padding: 6px 14px;
                border-radius: 6px;
                border: 1px solid var(--border);
                background: transparent;
                color: var(--muted);
                cursor: pointer;
                transition: all 0.15s;
            }
            button:hover {
                border-color: rgba(255,255,255,0.22);
                color: var(--text);
            }
            button.active {
                color: var(--text);
                border-color: transparent;
            }
            button#btn-pause { margin-left: auto; }

            #btn-t1.active { background: rgba(181,123,238,0.18); border-color: rgba(181,123,238,0.45); color: #c99af5; }
            #btn-t2.active { background: rgba(245,132,74,0.18); border-color: rgba(245,132,74,0.45); color: #f5a36a; }
            #btn-t3.active { background: rgba(62,204,204,0.18); border-color: rgba(62,204,204,0.45); color: #5ef0f0; }
            #btn-t4.active { background: rgba(245,94,158,0.18); border-color: rgba(245,94,158,0.45); color: #f57ec0; }
            #btn-pause.paused { background: rgba(255,255,255,0.06); color: var(--text); border-color: rgba(255,255,255,0.2); }

            footer {
                margin-top: 2rem;
                font-size: 0.6rem;
                color: rgba(255,255,255,0.18);
                letter-spacing: 0.12em;
                text-transform: uppercase;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <header>
             <h1>Loop</h1>
        </header>

        <div class="canvas-wrap">
        <canvas id="c"></canvas>
        <div class="watermark">Loop ➰</div>
        </div>

        <div class="controls">
        <div class="slider-row">
            <label>Arms</label>
            <input type="range" id="arms" min="2" max="8" step="1" value="4">
            <span id="arms-v">4</span>
        </div>
        <div class="slider-row">
            <label>Ratio</label>
            <input type="range" id="ratio" min="2" max="11" step="1" value="3">
            <span id="ratio-v">3</span>
        </div>
        <div class="slider-row">
            <label>Speed</label>
            <input type="range" id="spd" min="1" max="12" step="1" value="4">
            <span id="spd-v">4</span>
        </div>
        <div class="slider-row">
            <label>Trail</label>
            <input type="range" id="trail" min="100" max="1200" step="50" value="700">
            <span id="trail-v">700</span>
        </div>
        <div class="divider"></div>
        <div class="btn-row">
            <button id="btn-t1" class="active">Neon</button>
            <button id="btn-t2">Ember</button>
            <button id="btn-t3">Ocean</button>
            <button id="btn-t4">Candy</button>
            <button id="btn-clear">Clear</button>
            <button id="btn-pause">⏸ Pause</button>
        </div>
        </div>

        <footer>Drag sliders · Change theme · Watch loops emerge</footer>

        <script>
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');

            const THEMES = {
            neon:  ['#b57bee','#5ec9f5','#f55e9e','#7bf5c5','#f5c45e','#ee7bbb','#7bcdf5','#f57b7b'],
            ember: ['#f5844a','#f5c45e','#ee5e7b','#f5a33c','#e85588','#f5d080','#f0704a','#f59560'],
            ocean: ['#3ecccc','#4a9ef5','#5efaf0','#5e9af5','#1ad4a0','#2ae0d0','#60aff5','#40d4b0'],
            candy: ['#f55eb0','#c97bee','#ee5e5e','#f597ee','#ee7b9e','#d45ef5','#f57bb5','#ee9ef5'],
            };
            let theme = 'neon';
            let paused = false;
            let t = 0;
            const trailPts = [];

            function getConfig() {
            return {
                arms:    +document.getElementById('arms').value,
                ratio:   +document.getElementById('ratio').value,
                speed:   +document.getElementById('spd').value * 0.003,
                maxTrail: +document.getElementById('trail').value,
            };
            }

            function setup() {
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.parentElement.clientWidth;
            const h = Math.round(w * 0.65);
            canvas.width  = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width  = w + 'px';
            canvas.style.height = h + 'px';
            ctx.scale(dpr, dpr);
            clearTrail();
            }

            function clearTrail() {
            trailPts.length = 0;
            const w = canvas.width  / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.fillStyle = '#080810';
            ctx.fillRect(0, 0, w, h);
            }

            function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            return [r,g,b];
            }

            function draw() {
            if (!paused) {
                const { arms, ratio, speed, maxTrail } = getConfig();
                const dpr = window.devicePixelRatio || 1;
                const W = canvas.width  / dpr;
                const H = canvas.height / dpr;
                const cx = W / 2, cy = H / 2;
                const R  = Math.min(cx, cy) * 0.82;

                t += speed;

                const pts = [];
                for (let a = 0; a < arms; a++) {
                const phase = (a / arms) * Math.PI * 2;
                const r1 = R * 0.54;
                const r2 = R * 0.32;
                const x = cx + r1 * Math.cos(t + phase) + r2 * Math.cos(ratio * t + phase);
                const y = cy + r1 * Math.sin(t + phase) + r2 * Math.sin(ratio * t + phase);
                pts.push({ x, y });
                }
                trailPts.push(pts);
                if (trailPts.length > maxTrail) trailPts.shift();

                ctx.fillStyle = 'rgba(8,8,16,0.14)';
                ctx.fillRect(0, 0, W, H);

                const colors = THEMES[theme];
                const len = trailPts.length;

                for (let i = 1; i < len; i++) {
                const alpha = (i / len);
                const prev = trailPts[i-1];
                const curr = trailPts[i];
                const maxA = curr.length;
                for (let a = 0; a < maxA; a++) {
                    if (!prev[a]) continue;
                    const [r,g,b] = hexToRgb(colors[a % colors.length]);
                    ctx.beginPath();
                    ctx.moveTo(prev[a].x, prev[a].y);
                    ctx.lineTo(curr[a].x, curr[a].y);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.9})`;
                    ctx.lineWidth = 0.8 + alpha * 2.2;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }
                }

                const last = trailPts[trailPts.length - 1];
                if (last) {
                last.forEach((p, a) => {
                    const [r,g,b] = hexToRgb(colors[a % colors.length]);
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${r},${g},${b},1)`;
                    ctx.shadowColor = colors[a % colors.length];
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
                }
            }
            requestAnimationFrame(draw);
            }

            ['arms','ratio','spd','trail'].forEach(id => {
            const el = document.getElementById(id);
            const out = document.getElementById(id + '-v');
            el.addEventListener('input', () => { out.textContent = el.value; clearTrail(); });
            });

            document.getElementById('btn-clear').addEventListener('click', clearTrail);

            document.getElementById('btn-pause').addEventListener('click', () => {
            paused = !paused;
            const btn = document.getElementById('btn-pause');
            btn.textContent = paused ? '▶ Resume' : '⏸ Pause';
            btn.classList.toggle('paused', paused);
            });

            [['btn-t1','neon'],['btn-t2','ember'],['btn-t3','ocean'],['btn-t4','candy']].forEach(([id, name]) => {
            document.getElementById(id).addEventListener('click', () => {
                theme = name;
                document.querySelectorAll('[id^="btn-t"]').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                clearTrail();
                const el = document.getElementById('spd');
                if (name === 'neon')  { document.documentElement.style.setProperty('--accent','#b57bee'); }
                if (name === 'ember') { document.documentElement.style.setProperty('--accent','#f5844a'); }
                if (name === 'ocean') { document.documentElement.style.setProperty('--accent','#3ecccc'); }
                if (name === 'candy') { document.documentElement.style.setProperty('--accent','#f55eb0'); }
            });
            });

            window.addEventListener('resize', setup);
            setup();
            draw();
        </script>
    </body>
</html>
